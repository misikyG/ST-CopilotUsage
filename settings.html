<div class="copilot-usage-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b><svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-brand-github-copilot" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
  <path d="M4 18v-5.5c0 -.667 .167 -1.333 .5 -2" />
  <path d="M12 7.5c0 -1 -.01 -4.07 -4 -3.5c-3.5 .5 -4 2.5 -4 3.5c0 1.5 0 4 3 4c4 0 5 -2.5 5 -4z" />
  <path d="M4 12c-1.333 .667 -2 1.333 -2 2c0 1 0 3 1.5 4c3 2 6.5 3 8.5 3s5.499 -1 8.5 -3c1.5 -1 1.5 -3 1.5 -4c0 -.667 -.667 -1.333 -2 -2" />
  <path d="M20 18v-5.5c0 -.667 -.167 -1.333 -.5 -2" />
  <path d="M12 7.5l0 -.297l.01 -.269l.027 -.298l.013 -.105l.033 -.215c.014 -.073 .029 -.146 .046 -.22l.06 -.223c.336 -1.118 1.262 -2.237 3.808 -1.873c2.838 .405 3.703 1.797 3.93 2.842l.036 .204c0 .033 .01 .066 .013 .098l.016 .185l0 .171l0 .49l-.015 .394l-.02 .271c-.122 1.366 -.655 2.845 -2.962 2.845c-3.256 0 -4.524 -1.656 -4.883 -3.081l-.053 -.242a3.865 3.865 0 0 1 -.036 -.235l-.021 -.227a3.518 3.518 0 0 1 -.007 -.215z" />
  <path d="M10 15v2" />
  <path d="M14 15v2" />
</svg> GitHub Copilot用量檢視</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <!-- Token Input -->
            <div class="copilot-usage_block flex-container flexFlowColumn">
                <label for="copilot_github_token">
                    <small>GitHub Personal Access Token</small>
                </label>
                <div class="copilot-token-input-wrapper">
                    <input id="copilot_github_token" type="password" class="text_pole" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
                    <div id="copilot_toggle_token_visibility" class="menu_button fa-solid fa-eye-slash" title="顯示/隱藏 Token"></div>
                </div>
            </div>

            <!-- Usage Display -->
            <div id="copilot_usage_display" class="copilot-usage_block" style="display:none;">
                <div class="copilot-progress-container">
                    <div class="copilot-progress-label">
                        <span id="copilot_plan_label" class="copilot-plan-label"></span>
                        <span id="copilot_usage_summary" class="copilot-usage-summary"></span>
                    </div>
                    <div class="copilot-progress-row">
                        <div class="copilot-progress-bar-wrapper">
                            <div id="copilot_progress_bar" class="copilot-progress-bar" style="width: 0%;"></div>
                        </div>
                        <div id="copilot_refresh_btn" class="copilot-refresh-btn" title="重新整理">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Message -->
            <div id="copilot_status_message" class="copilot-usage_block copilot-status" style="display:none;">
                <span id="copilot_status_text"></span>
            </div>

            <hr class="sysHR" />
        </div>
    </div>
</div>
